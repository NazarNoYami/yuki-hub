name: Lint

on:
  push:
    branches: [main]
    paths: ['features/**', 'main.lua', 'build.lua', '.luacheckrc']
  pull_request:
    branches: [main]
    paths: ['features/**', 'main.lua', 'build.lua', '.luacheckrc']

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1.5"
      - uses: leafo/gh-actions-luarocks@v4
      - name: Install luacheck
        run: luarocks install luacheck
      - name: Run luacheck
        run: luacheck features/ main.lua build.lua --config .luacheckrc
